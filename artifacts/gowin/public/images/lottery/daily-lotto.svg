<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#431407"/>
      <stop offset="100%" style="stop-color:#7c2d12"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <rect width="280" height="120" rx="12" fill="url(#bg)"/>
  <!-- Sun icon -->
  <g transform="translate(38,60)">
    <circle r="16" fill="url(#sun)"/>
    <!-- Sun rays -->
    <line x1="0" y1="-22" x2="0" y2="-18" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="22" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-22" y1="0" x2="-18" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="22" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="-16" x2="-13" y2="-13" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="13" y1="13" x2="16" y2="16" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="13" y1="-13" x2="16" y2="-16" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="16" x2="-13" y2="13" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="163" y="40" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#fbbf24" text-anchor="middle" letter-spacing="2">DAILY</text>
  <text x="163" y="74" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="white" text-anchor="middle" letter-spacing="-1">LOTTO</text>
  <rect x="78" y="87" width="165" height="2" rx="1" fill="#f97316" opacity="0.6"/>
  <text x="163" y="108" font-family="Arial, sans-serif" font-size="10" fill="#fb923c" opacity="0.8" text-anchor="middle" letter-spacing="2">SOUTH AFRICA</text>
</svg>
