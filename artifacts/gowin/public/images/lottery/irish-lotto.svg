<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="280" height="120" rx="12" fill="url(#bg)"/>
  <!-- Shamrock icon -->
  <g transform="translate(38,58)">
    <!-- Three leaf circles -->
    <circle cx="0" cy="-14" r="12" fill="url(#green)" opacity="0.9"/>
    <circle cx="-12" cy="0" r="12" fill="url(#green)" opacity="0.9"/>
    <circle cx="12" cy="0" r="12" fill="url(#green)" opacity="0.9"/>
    <!-- Center -->
    <circle cx="0" cy="-5" r="8" fill="url(#green)"/>
    <!-- Stem -->
    <rect x="-2" y="10" width="4" height="16" rx="2" fill="#4ade80"/>
    <!-- Vein lines -->
    <line x1="0" y1="-22" x2="0" y2="-6" stroke="#14532d" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="0" x2="-4" y2="-4" stroke="#14532d" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="0" x2="4" y2="-4" stroke="#14532d" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="163" y="40" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#4ade80" text-anchor="middle" letter-spacing="2">IRISH</text>
  <text x="163" y="74" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="white" text-anchor="middle" letter-spacing="-1">LOTTO</text>
  <rect x="78" y="87" width="165" height="2" rx="1" fill="#4ade80" opacity="0.5"/>
  <text x="163" y="108" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" opacity="0.8" text-anchor="middle" letter-spacing="2">IRELAND</text>
</svg>
