<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#0c0a09"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="goldBall" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="280" height="120" rx="12" fill="url(#bg)"/>
  <!-- Stars -->
  <text x="20" y="30" font-size="14" fill="#fbbf24" opacity="0.7">★</text>
  <text x="250" y="30" font-size="14" fill="#fbbf24" opacity="0.7">★</text>
  <text x="260" y="80" font-size="10" fill="#fbbf24" opacity="0.5">★</text>
  <text x="15" y="90" font-size="10" fill="#fbbf24" opacity="0.5">★</text>
  <!-- Gold ball -->
  <circle cx="42" cy="50" r="22" fill="url(#goldBall)"/>
  <circle cx="36" cy="42" r="7" fill="white" opacity="0.25"/>
  <text x="42" y="57" font-family="Arial Black" font-size="18" fill="#7c3aed" font-weight="900" text-anchor="middle">M</text>
  <!-- MEGA MILLIONS text -->
  <text x="155" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="26" fill="url(#gold)" text-anchor="middle" letter-spacing="1">MEGA</text>
  <text x="155" y="72" font-family="Arial Black, Arial" font-weight="900" font-size="26" fill="white" text-anchor="middle" letter-spacing="1">MILLIONS</text>
  <!-- Bottom accent -->
  <rect x="70" y="88" width="170" height="3" rx="2" fill="url(#gold)" opacity="0.6"/>
  <text x="155" y="108" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24" opacity="0.8" text-anchor="middle" letter-spacing="2">OFFICIAL GAME</text>
</svg>
