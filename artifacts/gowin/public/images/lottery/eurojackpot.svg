<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="280" height="120" rx="12" fill="url(#bg)"/>
  <!-- Jackpot lightning bolt icon -->
  <g transform="translate(32,60)">
    <circle r="26" fill="#7c3aed" opacity="0.25"/>
    <circle r="22" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5"/>
    <text x="0" y="8" font-size="28" text-anchor="middle" fill="#a78bfa">⚡</text>
  </g>
  <!-- Text -->
  <text x="165" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="24" fill="url(#purple)" text-anchor="middle" letter-spacing="1">EURO</text>
  <text x="165" y="72" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="white" text-anchor="middle" letter-spacing="-1">JACKPOT</text>
  <!-- Stars -->
  <text x="92" y="38" font-size="8" fill="#fbbf24">★</text>
  <text x="236" y="38" font-size="8" fill="#fbbf24">★</text>
  <!-- Bottom -->
  <rect x="80" y="87" width="155" height="2" rx="1" fill="#7c3aed" opacity="0.6"/>
  <text x="165" y="108" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" opacity="0.8" text-anchor="middle" letter-spacing="2">5+2 NUMBERS</text>
</svg>
