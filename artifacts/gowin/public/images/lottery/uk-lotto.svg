<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="280" height="120" rx="12" fill="url(#bg)"/>
  <!-- Union Jack simplified icon -->
  <g transform="translate(38,60)">
    <circle r="26" fill="#1d4ed8" opacity="0.8"/>
    <!-- Cross -->
    <rect x="-26" y="-4" width="52" height="8" fill="white"/>
    <rect x="-4" y="-26" width="8" height="52" fill="white"/>
    <!-- Diagonal stripes -->
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="red" stroke-width="5" opacity="0.9"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="red" stroke-width="5" opacity="0.9"/>
    <circle r="26" fill="none" stroke="white" stroke-width="0"/>
    <circle r="27" fill="none" clip-path=""/>
  </g>
  <!-- Lotto text -->
  <text x="163" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="url(#green)" text-anchor="middle" letter-spacing="2">NATIONAL</text>
  <text x="163" y="72" font-family="Arial Black, Arial" font-weight="900" font-size="34" fill="white" text-anchor="middle" letter-spacing="-1">LOTTO</text>
  <!-- Bottom -->
  <rect x="78" y="87" width="165" height="2" rx="1" fill="#34d399" opacity="0.5"/>
  <text x="163" y="108" font-family="Arial, sans-serif" font-size="10" fill="#34d399" opacity="0.8" text-anchor="middle" letter-spacing="2">UNITED KINGDOM</text>
</svg>
