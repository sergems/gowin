openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GoWin Sports Betting Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: wallet
    description: Wallet operations
  - name: sports
    description: Sports, leagues, fixtures
  - name: bets
    description: Bet placement and history
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email or username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset OTP via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: OTP sent (always returns success to prevent enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and receive a reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: OTP valid, reset token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetTokenPayload"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using a valid reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password while logged in (required after temp password login)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed, new token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Users ─────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users, admin]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users, admin]
      summary: Get user by ID (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/reset-password:
    post:
      operationId: adminResetPassword
      tags: [users, admin]
      summary: Admin generates a temporary password for a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Temporary password generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TempPasswordPayload"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Wallet ────────────────────────────────────────────────────────────────
  /wallet:
    get:
      operationId: getMyWallet
      tags: [wallet]
      summary: Get current user wallet
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: getMyTransactions
      tags: [wallet]
      summary: Get current user transaction history
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"

  /wallet/credit:
    post:
      operationId: creditWallet
      tags: [wallet, admin]
      summary: Credit a user wallet (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAdjustInput"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/debit:
    post:
      operationId: debitWallet
      tags: [wallet, admin]
      summary: Debit a user wallet (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletAdjustInput"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/user/{userId}:
    get:
      operationId: getUserWallet
      tags: [wallet, admin]
      summary: Get wallet for a specific user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  # ── Sports ────────────────────────────────────────────────────────────────
  /sports:
    get:
      operationId: listSports
      tags: [sports]
      summary: List all sports
      responses:
        "200":
          description: Sports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sport"
    post:
      operationId: createSport
      tags: [sports, admin]
      summary: Create a sport (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sport"

  /leagues:
    get:
      operationId: listLeagues
      tags: [sports]
      summary: List leagues, optionally filtered by sport
      parameters:
        - name: sportId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leagues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/League"
    post:
      operationId: createLeague
      tags: [sports, admin]
      summary: Create a league (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeagueInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/League"

  /teams:
    get:
      operationId: listTeams
      tags: [sports]
      summary: List teams
      responses:
        "200":
          description: Teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [sports, admin]
      summary: Create a team (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /fixtures:
    get:
      operationId: listFixtures
      tags: [sports]
      summary: List fixtures
      parameters:
        - name: leagueId
          in: query
          schema:
            type: integer
        - name: sportId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, live, finished]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: withMarkets
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Fixtures
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixtureListResponse"
    post:
      operationId: createFixture
      tags: [sports, admin]
      summary: Create a fixture (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixtureInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fixture"

  /fixtures/{id}:
    get:
      operationId: getFixture
      tags: [sports]
      summary: Get fixture with markets and odds
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fixture detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixtureDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFixture
      tags: [sports, admin]
      summary: Update fixture (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixtureUpdate"
      responses:
        "200":
          description: Updated fixture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fixture"

  /fixtures/{id}/settle:
    post:
      operationId: settleFixture
      tags: [sports, admin]
      summary: Settle all bets for a fixture (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleFixtureInput"
      responses:
        "200":
          description: Settlement result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettleResult"

  # ── Markets / Odds ────────────────────────────────────────────────────────
  /markets:
    post:
      operationId: createMarket
      tags: [sports, admin]
      summary: Create a market for a fixture (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Market"

  /odds/{id}:
    patch:
      operationId: updateOdds
      tags: [sports, admin]
      summary: Update odds value (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OddsUpdate"
      responses:
        "200":
          description: Updated odds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Odds"

  # ── Bets ──────────────────────────────────────────────────────────────────
  /bets:
    post:
      operationId: placeBet
      tags: [bets]
      summary: Place a single or accumulator bet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BetInput"
      responses:
        "201":
          description: Bet placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "400":
          description: Insufficient funds or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listAllBets
      tags: [bets, admin]
      summary: List all bets (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, won, lost, void]
        - name: userId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Bets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetListResponse"

  /bets/my:
    get:
      operationId: getMyBets
      tags: [bets]
      summary: Get current user's bets
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, won, lost, void]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: My bets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetListResponse"

  /bets/{id}:
    get:
      operationId: getBet
      tags: [bets]
      summary: Get bet details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bet detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bets/{id}/void:
    patch:
      operationId: voidBet
      tags: [bets, admin]
      summary: Void a bet (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Voided bet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"

  # ── Admin Stats ───────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform statistics (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/recent-bets:
    get:
      operationId: getRecentBets
      tags: [admin]
      summary: Get most recent bets across all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"

  /admin/top-fixtures:
    get:
      operationId: getTopFixtures
      tags: [admin]
      summary: Get fixtures with most betting activity (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Top fixtures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixtureBetSummary"

  # ── Live Betting ────────────────────────────────────────────────────────────
  /live/fixtures:
    get:
      operationId: getLiveFixtures
      tags: [live]
      summary: Get all live fixtures with main markets (from in-memory cache)
      responses:
        "200":
          description: Live fixtures list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveFixtureList"

  /live/fixtures/{id}/markets:
    get:
      operationId: getLiveFixtureMarkets
      tags: [live]
      summary: Get full market list for a live fixture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full market list for the fixture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveFixtureMarketsPayload"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Fixture not found

  /admin/api-monitor:
    get:
      operationId: getApiMonitorStats
      tags: [admin, live]
      summary: Live cache health — API request counters, sync timestamps, WS connections (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Monitor stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMonitorPayload"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [username, firstName, lastName, email, phoneNumber, password]
      properties:
        username:
          type: string
          minLength: 3
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          description: DRC mobile number in any common format (0812345678, +243812345678, 243812345678)
        password:
          type: string
          minLength: 6
        referralCode:
          type: string

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Phone number or email address
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        mustChangePassword:
          type: boolean

    # ── User ──────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, username, email, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin, manager, branch_admin, agent, payout, payment_clerk]
        disabled:
          type: boolean
        mustChangePassword:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserDetail:
      type: object
      required: [id, username, email, role, createdAt, wallet]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin, manager, branch_admin, agent, payout, payment_clerk]
        disabled:
          type: boolean
        disabledReason:
          type: ["string", "null"]
        mustChangePassword:
          type: boolean
        loginAttempts:
          type: integer
        createdAt:
          type: string
          format: date-time
        wallet:
          $ref: "#/components/schemas/Wallet"

    # ── Password Reset ─────────────────────────────────────────────────────
    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyOtpInput:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6

    ResetTokenPayload:
      type: object
      required: [resetToken]
      properties:
        resetToken:
          type: string

    ResetPasswordInput:
      type: object
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
          minLength: 6

    ChangePasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 6

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    TempPasswordPayload:
      type: object
      required: [message, tempPassword, expiresAt]
      properties:
        message:
          type: string
